name: Update US Market Dashboard

on:
  schedule:
    - cron: '0 13 * * 1-5' # 台北時間週一至五晚上 9 點 (美股開盤前)
  workflow_dispatch:      # 支援手動觸發 (線上 Trigger)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install httpx beautifulsoup4 jinja2

      - name: Fetch data and Generate dashboard
        run: |
          # 修正腳本路徑以符合 GitHub Actions 環境
          python us-market-trends/scripts/fetch_market_data.py
          python us-market-trends/scripts/generate_dashboard.py --data us-market-trends/data/market_data.json --template us-market-trends/assets/dashboard_template.html --output us-market-trends/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./us-market-trends
          publish_branch: gh-pages
